name: Format

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# contents: write so the bot can push formatting commits back to the branch.
permissions:
  contents: write

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Auto-format and commit (ruff + oxfmt)
    runs-on: ubuntu-22.04
    steps:
      # persist-credentials (default true) keeps the GITHUB_TOKEN in git config
      # so the commit step below can push back to the triggering ref.
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # oxfmt ships as an npm package (NAPI bindings); ruff via pip. Node 22
      # satisfies oxfmt's engines (>=22.12.0).
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Pin ruff and oxfmt so a formatter release can't silently reformat the
      # repo and create churn (or a conflicting commit) on CI. Bump in lockstep
      # with the versions used by the local pre-commit hooks
      # (additional_dependencies in .pre-commit-config.yaml). ruff is pinned
      # with pip's == syntax; oxfmt with npm's @ syntax.
      - name: Install ruff (pip) and oxfmt (npm)
        run: |
          python -m pip install "ruff==0.15.22"
          npm install -g oxfmt@0.59.0

      # --write: rewrite in place, then the commit step below pushes the fix.
      # Mirrors `ruff format` / `ruff --fix` in .pre-commit-config.yaml so CI
      # and the local hooks produce identical output.
      - name: Format Python and notebooks (ruff format)
        # Covers .py under python/ + backend/ AND Jupyter notebooks (.ipynb):
        # ruff formats the Python cells. TOML is intentionally out of scope
        # (ruff does not format TOML; check-toml in pre-commit validates it).
        run: ruff format --config ruff.toml python backend

      # oxfmt owns JS/TS/JSON/CSS/YAML/YML/TOML across the repo.
      # ignorePatterns in .oxfmtrc.json keeps it off ipynb (owned by ruff
      # above), Python (owned by ruff), and generated/lock files.
      - name: Format JS/TS/JSON/CSS/YAML/TOML (oxfmt)
        run: oxfmt --write .

      # Lint with --fix so auto-fixable violations get rewritten too; ruff
      # still exits non-zero if anything remains, which makes the job red so
      # the commit step's `if: always()` commits the partial fixes while the
      # failure surfaces the remaining, manual issues.
      - name: Lint and auto-fix Python (ruff check --fix)
        run: ruff check --config ruff.toml --fix python backend

      # Commit any formatting/lint fixes the previous steps wrote. `if:
      # always()` so partial fixes still land when ruff check fails on
      # unfixable violations; the job stays red in that case. `[skip ci]`
      # avoids re-triggering this workflow on the bot's own push.
      - name: Commit formatting changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formatting changes; nothing to commit."
          else
            git add -A
            git commit -m "style: auto-format (ruff + oxfmt) [skip ci]"
            git push
            echo "Committed formatting changes."
          fi
