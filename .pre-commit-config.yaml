repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]
      - id: cargo-check
        name: cargo check
        entry: cargo check --workspace --all-targets
        language: system
        pass_filenames: false
        types: [rust]
